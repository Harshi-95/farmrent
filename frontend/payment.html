<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment</title>

    <style>
        body{
        margin:0;
        font-family:Arial;
        background:#f5f7fa;
        }

        .navbar{
        background:white;
        padding:15px 30px;
        display:flex;
        justify-content:space-between;
        border-bottom:1px solid #ddd;
        }

        .container{
        width:1200px;
        margin:auto;
        display:flex;
        gap:30px;
        padding:30px;
        }

        .left,.right{
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }

        .left{width:48%;}
        .right{width:52%;}

        .left img{
        width:100%;
        height:260px;
        object-fit:cover;
        border-radius:12px;
        }

        h2{
        margin-top:15px;
        }

        .row{
        display:flex;
        justify-content:space-between;
        margin:10px 0;
        }

        .total{
        font-size:28px;
        font-weight:bold;
        color:green;
        }

        .tabs{
        display:flex;
        gap:10px;
        margin-bottom:20px;
        }

        .tabs button{
        flex:1;
        padding:12px;
        border:none;
        background:#eee;
        cursor:pointer;
        border-radius:8px;
        font-weight:bold;
        }

        .tabs button.active{
        background:#16a34a;
        color:white;
        }

        input,textarea{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:1px solid #ccc;
        border-radius:8px;
        }

        .paybtn{
        width:100%;
        margin-top:20px;
        padding:14px;
        background:#16a34a;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🌱 FarmRent</h2>
    <a href="farmer.html">Back Home</a>
</div>

<div class="container">

    <div class="left">

        <img id="img">

        <h2 id="name"></h2>

        <div class="row">
            <span>Start Date</span>
            <b id="start"></b>
        </div>

        <div class="row">
            <span>End Date</span>
            <b id="end"></b>
        </div>

        <div class="row">
            <span>Total Amount</span>
            <div class="total">₹<span id="total"></span></div>
        </div>

    </div>

    <div class="right">

        <h2>Complete Payment</h2>

        <div class="tabs">
            <button class="active" onclick="setMode('UPI',this)">UPI</button>
            <button onclick="setMode('CARD',this)">Card</button>
            <button onclick="setMode('COD',this)">COD</button>
        </div>

        <div id="methodBox">
            <input placeholder="Enter UPI ID">
        </div>

        <h3>Delivery Address</h3>

        <textarea id="address" placeholder="Full Address"></textarea>
        <input id="city" placeholder="City">
        <input id="pincode" placeholder="Pincode">
        <input id="landmark" placeholder="Landmark">
        <input id="phone" placeholder="Phone Number">

        <button class="paybtn" onclick="payNow()">
            Pay & Confirm Booking
        </button>

    </div>

</div>

<script>

    let paymentMode="UPI";

    document.getElementById("name").innerText=localStorage.getItem("name");
    document.getElementById("img").src=localStorage.getItem("image");
    document.getElementById("start").innerText=localStorage.getItem("startDate");
    document.getElementById("end").innerText=localStorage.getItem("endDate");
    document.getElementById("total").innerText=localStorage.getItem("total");

    function setMode(mode,btn){

paymentMode = mode;

document.querySelectorAll(".tabs button")
.forEach(x => x.classList.remove("active"));

btn.classList.add("active");

let box = document.getElementById("methodBox");

if(mode=="UPI"){
box.innerHTML = `
<input id="upiId" placeholder="Enter UPI ID">
`;
}

if(mode=="CARD"){
box.innerHTML = `
<input id="cardNumber" placeholder="Card Number">
<input id="expiry" placeholder="MM/YY">
<input id="cvv" placeholder="CVV">
`;
}

if(mode=="COD"){
box.innerHTML = `
<p>Pay cash when equipment arrives.</p>
`;
}

}

    function payNow(){

let receiptId = "FRD" + Math.floor(Math.random()*100000);

let data = {
    paymentMode: paymentMode,
    amount: localStorage.getItem("total"),
    equipmentName: localStorage.getItem("name"),
    paymentStatus: "Success"
};

/* UPI */
if(paymentMode=="UPI"){
    data.upiId = document.querySelector("#methodBox input").value;
}

/* CARD */
if(paymentMode=="CARD"){

    let inputs = document.querySelectorAll("#methodBox input");

    data.cardName = localStorage.getItem("name");
    data.cardNumber = inputs[0].value;
    data.expiry = inputs[1].value;
    data.cvv = inputs[2].value;
}

/* COD */
if(paymentMode=="COD"){
    data.paymentStatus = "Pending";
}

fetch("http://localhost:8080/api/payments",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(data=>{

return fetch("http://localhost:8080/api/bookings",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

equipmentName:localStorage.getItem("name"),
price:localStorage.getItem("price"),
totalPrice:localStorage.getItem("total"),
startDate:localStorage.getItem("startDate"),
endDate:localStorage.getItem("endDate"),
image:localStorage.getItem("image"),

paymentMode:paymentMode,
status:"Paid",
receiptId:receiptId,

deliveryAddress:document.getElementById("address").value,
city:document.getElementById("city").value,
pincode:document.getElementById("pincode").value,
landmark:document.getElementById("landmark").value,
phone:document.getElementById("phone").value,

userId: localStorage.getItem("userId"),
userEmail: localStorage.getItem("userEmail")

})
});

})
.then(res=>res.text())
.then(data=>{

localStorage.setItem("receiptId",receiptId);
window.location.href="success.html";

});

}

</script>

</body>
</html>
