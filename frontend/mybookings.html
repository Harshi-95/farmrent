<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f5f7fa;
        }

        /* Navbar */
        .navbar{
            width:100%;
            background:white;
            padding:18px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #e5e7eb;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:#16a34a;
        }

        .menu{
            display:flex;
            gap:28px;
            font-size:15px;
            color:#444;
        }

        .menu a{
            text-decoration:none;
            color:#444;
        }

        .menu .active{
            color:#16a34a;
            font-weight:bold;
            background:#eafaf0;
            padding:8px 14px;
            border-radius:8px;
        }

        /* Main */
        .container{
            width:1100px;
            margin:35px auto;
        }

        .title{
            font-size:32px;
            font-weight:bold;
            color:#111827;
        }

        .subtitle{
            color:#6b7280;
            margin-top:6px;
            margin-bottom:28px;
        }

        /* Card */
        .card{
            background:white;
            border-radius:14px;
            padding:22px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
            margin-bottom:20px;
        }

        .left{
            display:flex;
            gap:20px;
            align-items:center;
        }

        .left img{
            width:150px;
            height:95px;
            object-fit:cover;
            border-radius:10px;
        }

        .details h3{
            font-size:22px;
            margin-bottom:8px;
            color:#111827;
        }

        .details p{
            color:#6b7280;
            margin:6px 0;
            font-size:15px;
        }

        .middle{
            display:flex;
            gap:50px;
            color:#374151;
        }

        .middle div{
            font-size:15px;
        }

        .middle strong{
            display:block;
            color:#111827;
            margin-top:5px;
        }

        .right{
            text-align:right;
        }

        .status{
            display:inline-block;
            padding:7px 14px;
            border-radius:20px;
            background:#e8f0ff;
            color:#2563eb;
            font-size:14px;
            margin-bottom:18px;
        }

        .price{
            color:#16a34a;
            font-size:28px;
            font-weight:bold;
            margin-bottom:18px;
        }

        button{
            padding:10px 18px;
            border:1px solid #ef4444;
            color:#ef4444;
            background:white;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#ef4444;
            color:white;
        }
        .top-back{
    width:1100px;
    margin:25px auto 0;
}

.top-back a{
    text-decoration:none;
    color:#16a34a;
    font-weight:bold;
    font-size:16px;
}

.top-back a:hover{
    color:#15803d;
}
    </style>

</head>

<body>
<div class="top-back">
    <a href="farmer.html">← Back to Home</a>
</div>
<!-- Navbar -->

<!-- Main -->
<div class="container">

    <div class="title">My Bookings</div>
    <div class="subtitle">Manage your equipment rentals.</div>

    <div id="bookingList"></div>

</div>

<script>
    let userId = localStorage.getItem("userId");
    fetch("http://localhost:8080/api/bookings")
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById("bookingList");

        if(data.length === 0){
            container.innerHTML = "<h3>No bookings yet 🚜</h3>";
            return;
        }

        data.filter(b => b.userId == userId)
.forEach(b => {

            container.innerHTML += `
<div class="card">

    <div class="left">
        <img src="${b.image}">

        <div class="details">
            <h3>${b.equipmentName}</h3>
            <p>Receipt ID: ${b.receiptId}</p>
            <p>Payment Mode: ${b.paymentMode}</p>
        </div>
    </div>

    <div class="middle">

        <div>
            Start Date
            <strong>${b.startDate}</strong>
        </div>

        <div>
            End Date
            <strong>${b.endDate}</strong>
        </div>

        <div>
            Location
            <strong>${b.city}</strong>
        </div>

    </div>

    <div class="right">
        <div class="status">${b.status}</div>
        <div class="price">₹${b.totalPrice}</div>

        <button onclick="cancelBooking(${b.id})">
            Cancel Booking
        </button>
    </div>

</div>
`;
        });

    })
    .catch(err=>{
        console.log(err);
        document.getElementById("bookingList").innerHTML="Error loading bookings ❌";
    });


    function cancelBooking(id){

        fetch(`http://localhost:8080/api/bookings/${id}`,{
            method:"DELETE"
        })
        .then(res=>res.text())
        .then(msg=>{
            alert(msg);
            location.reload();
        });
    }

</script>

</body>
</html>
