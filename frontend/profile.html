<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <style>
        body{
        font-family:Arial;
        background:#f5f7fa;
        margin:0;
        }

        .container{
        width:1100px;
        margin:auto;
        padding:30px;
        }

        .card{
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 0 10px #ddd;
        }

        .top{
        display:flex;
        gap:20px;
        align-items:center;
        }

        .avatar{
        width:70px;
        height:70px;
        background:#22c55e;
        border-radius:50%;
        color:white;
        font-size:30px;
        display:flex;
        justify-content:center;
        align-items:center;
        }

        .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
        margin-top:25px;
        }

        .box{
        background:#f9fafb;
        padding:15px;
        border-radius:8px;
        }

        h1{
        margin-bottom:5px;
        }

        .small{
        color:gray;
        }
        .top-back{
    width:1100px;
    margin:25px auto 0;
}

.top-back a{
    text-decoration:none;
    color:#16a34a;
    font-weight:bold;
    font-size:16px;
}

.top-back a:hover{
    color:#15803d;
}

    </style>
</head>

<body>
<div class="top-back">
    <a href="farmer.html">← Back to Home</a>
</div>
<div class="container">

    <h1>Profile</h1>
    <p class="small">Manage your account information</p>

    <div class="card">

        <div class="top">
            <div class="avatar" id="avatar"></div>

            <div>
                <h2 id="name"></h2>
                <p id="role"></p>
            </div>
        </div>

        <div class="grid">

            <div class="box">
                <b>Email</b>
                <p id="email"></p>
            </div>

            <div class="box">
                <b>Phone</b>
                <p id="phone"></p>
            </div>

            <div class="box">
                <b>Account Type</b>
                <p id="role2"></p>
            </div>

            <div class="box">
                <b>Status</b>
                <p>Active Member</p>
            </div>

        </div>

    </div>

</div>

<script>

    let name = localStorage.getItem("userName");
    let email = localStorage.getItem("userEmail");
    let phone = localStorage.getItem("userPhone");
    let role = localStorage.getItem("userRole");

    document.getElementById("name").innerText = name;
    document.getElementById("email").innerText = email;
    document.getElementById("phone").innerText = phone;
    document.getElementById("role").innerText = role;
    document.getElementById("role2").innerText = role;
    document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();

</script>

</body>
</html>
